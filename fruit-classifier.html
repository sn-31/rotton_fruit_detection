<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FruitSense — Fresh or Rotten?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1A1208;
    --fresh: #2D7A3A;
    --fresh-light: #E8F5EA;
    --rotten: #8B2500;
    --rotten-light: #FAEAE6;
    --accent: #D4A843;
    --mid: #7A6A50;
    --border: #D4C9B0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  header {
    padding: 2rem 3rem;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
    color: var(--dark);
  }

  .logo span {
    color: var(--fresh);
    font-style: italic;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--mid);
    text-transform: uppercase;
  }

  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: auto;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 4rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: start;
  }

  /* LEFT PANEL */
  .upload-panel {
    position: sticky;
    top: 2rem;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 1rem;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.25s ease;
    background: #FAF7F2;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #FDF9F0;
  }

  .drop-zone.has-image {
    border-style: solid;
    border-color: var(--accent);
  }

  .drop-zone img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .drop-zone img.loaded { opacity: 1; }

  .drop-zone-content {
    text-align: center;
    transition: opacity 0.3s;
    z-index: 1;
  }

  .drop-zone.has-image .drop-zone-content { opacity: 0; pointer-events: none; }

  .drop-icon {
    font-size: 3rem;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .drop-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--dark);
  }

  .drop-sub {
    font-size: 0.8rem;
    color: var(--mid);
    margin-top: 0.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
  }

  #file-input { display: none; }

  .btn-analyze {
    width: 100%;
    margin-top: 1.25rem;
    padding: 1rem 1.5rem;
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }

  .btn-analyze:hover:not(:disabled) {
    background: var(--fresh);
    transform: translateY(-1px);
  }

  .btn-analyze:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-analyze .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-analyze.loading .spinner { display: block; }
  .btn-analyze.loading .btn-label { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .image-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(26,18,8,0.7));
    padding: 1.5rem 1rem 1rem;
    z-index: 2;
    display: none;
  }

  .drop-zone.has-image .image-overlay { display: block; }

  .image-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: rgba(245,240,232,0.9);
    letter-spacing: 0.1em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .change-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-top: 0.25rem;
  }

  /* RIGHT PANEL */
  .result-panel {
    min-height: 400px;
  }

  .placeholder-state {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    padding-top: 0.5rem;
  }

  .placeholder-card {
    background: #FAF7F2;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    height: 60px;
    animation: shimmer 1.8s ease infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .placeholder-card:nth-child(2) { animation-delay: 0.2s; height: 48px; }
  .placeholder-card:nth-child(3) { animation-delay: 0.4s; height: 48px; }

  /* Verdict card */
  .verdict-card {
    border-radius: 4px;
    padding: 2rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
    display: none;
    animation: fadeSlideIn 0.5s ease forwards;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .verdict-card.fresh {
    background: var(--fresh-light);
    border: 2px solid var(--fresh);
  }

  .verdict-card.rotten {
    background: var(--rotten-light);
    border: 2px solid var(--rotten);
  }

  .verdict-card.unknown {
    background: #FFF8E6;
    border: 2px solid var(--accent);
  }

  .verdict-emoji {
    font-size: 3rem;
    line-height: 1;
    margin-bottom: 0.75rem;
  }

  .verdict-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 0.25rem;
  }

  .verdict-name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  .verdict-card.fresh .verdict-name { color: var(--fresh); }
  .verdict-card.rotten .verdict-name { color: var(--rotten); }
  .verdict-card.unknown .verdict-name { color: var(--accent); }

  .verdict-confidence {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--mid);
  }

  .confidence-bar-wrap {
    margin-top: 1rem;
    height: 4px;
    background: rgba(0,0,0,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .confidence-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
    width: 0;
  }

  .verdict-card.fresh .confidence-bar-fill { background: var(--fresh); }
  .verdict-card.rotten .confidence-bar-fill { background: var(--rotten); }
  .verdict-card.unknown .confidence-bar-fill { background: var(--accent); }

  /* Probabilities */
  .probs-section {
    display: none;
    animation: fadeSlideIn 0.5s ease 0.15s both;
  }

  .prob-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1rem;
  }

  .prob-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
  }

  .prob-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .prob-dot.fresh { background: var(--fresh); }
  .prob-dot.rotten { background: var(--rotten); }

  .prob-name {
    font-size: 0.85rem;
    font-weight: 500;
    text-transform: capitalize;
    color: var(--dark);
  }

  .prob-pct {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--mid);
    text-align: right;
    align-self: end;
    padding-bottom: 0.3rem;
  }

  .prob-bar-wrap {
    grid-column: 1 / -1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .prob-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
    width: 0;
  }

  .prob-bar-fill.fresh { background: var(--fresh); }
  .prob-bar-fill.rotten { background: var(--rotten); }

  /* Error state */
  .error-state {
    display: none;
    padding: 1.5rem;
    background: var(--rotten-light);
    border: 1px solid var(--rotten);
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--rotten);
    animation: fadeSlideIn 0.3s ease forwards;
  }

  /* Info blurb */
  .info-blurb {
    margin-top: 2rem;
    padding: 1.25rem 1.5rem;
    border-left: 3px solid var(--accent);
    background: rgba(212,168,67,0.06);
    font-size: 0.8rem;
    color: var(--mid);
    line-height: 1.6;
    display: none;
  }

  .info-blurb strong {
    color: var(--dark);
    font-weight: 500;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--mid);
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; gap: 2rem; }
    .upload-panel { position: static; }
    header { padding: 1.25rem 1.5rem; }
    .logo { font-size: 1.5rem; }
    main { padding: 2rem 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Fruit<span>Sense</span></div>
  <div class="tagline">CNN Classifier · 6 Classes</div>
  <div class="header-dot"></div>
</header>

<main>
  <!-- LEFT: Upload -->
  <div class="upload-panel">
    <div class="section-label">01 — Upload Image</div>

    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-content">
        <div class="drop-icon">🍎</div>
        <div class="drop-text">Drop your fruit here</div>
        <div class="drop-sub">JPG · PNG · WEBP · up to 10MB</div>
      </div>
      <img id="preview" alt="Preview" />
      <div class="image-overlay">
        <div class="image-name" id="imageName"></div>
        <button class="change-btn" onclick="document.getElementById('file-input').click()">Change image</button>
      </div>
    </div>

    <input type="file" id="file-input" accept="image/*" />

    <button class="btn-analyze" id="analyzeBtn" disabled>
      <div class="spinner"></div>
      <span class="btn-label">Analyse Fruit</span>
    </button>
  </div>

  <!-- RIGHT: Results -->
  <div class="result-panel">
    <div class="section-label">02 — Analysis</div>

    <!-- placeholder -->
    <div class="placeholder-state" id="placeholderState">
      <div class="placeholder-card"></div>
      <div class="placeholder-card"></div>
      <div class="placeholder-card"></div>
    </div>

    <!-- Error -->
    <div class="error-state" id="errorState"></div>

    <!-- Verdict -->
    <div class="verdict-card" id="verdictCard">
      <div class="verdict-emoji" id="verdictEmoji"></div>
      <div class="verdict-label">Prediction</div>
      <div class="verdict-name" id="verdictName"></div>
      <div class="verdict-confidence" id="verdictConf"></div>
      <div class="confidence-bar-wrap">
        <div class="confidence-bar-fill" id="confBar"></div>
      </div>
    </div>

    <!-- Probabilities -->
    <div class="probs-section" id="probsSection">
      <div class="section-label" style="margin-bottom:1.25rem">All Probabilities</div>
      <div id="probsList"></div>
    </div>

    <!-- Info -->
    <div class="info-blurb" id="infoBlurb"></div>
  </div>
</main>

<footer>FruitSense · CNN Model · freshapples · freshbanana · freshoranges · rottenapples · rottenbanana · rottenoranges</footer>

<script>
  const CLASS_NAMES = [
    'freshapples', 'freshbanana', 'freshoranges',
    'rottenapples', 'rottenbanana', 'rottenoranges'
  ];

  const FRUIT_EMOJIS = {
    apple: '🍎', banana: '🍌', orange: '🍊'
  };

  const DESCRIPTIONS = {
    freshapples:   { short: 'Fresh Apple',   status: 'fresh',  tip: 'This apple looks great — firm, vibrant, and ready to eat.' },
    freshbanana:   { short: 'Fresh Banana',  status: 'fresh',  tip: 'A ripe, healthy banana at peak flavour.' },
    freshoranges:  { short: 'Fresh Orange',  status: 'fresh',  tip: 'A fresh orange — juicy and full of vitamin C.' },
    rottenapples:  { short: 'Rotten Apple',  status: 'rotten', tip: 'Signs of spoilage detected. Best to discard this apple.' },
    rottenbanana:  { short: 'Rotten Banana', status: 'rotten', tip: 'The banana has deteriorated and is no longer safe to eat.' },
    rottenoranges: { short: 'Rotten Orange', status: 'rotten', tip: 'This orange shows signs of rot. Dispose of it properly.' },
  };

  function getFruitKey(cls) {
    if (cls.includes('apple'))  return 'apple';
    if (cls.includes('banana')) return 'banana';
    return 'orange';
  }

  // --- DOM refs ---
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('file-input');
  const preview     = document.getElementById('preview');
  const imageName   = document.getElementById('imageName');
  const analyzeBtn  = document.getElementById('analyzeBtn');
  const placeholder = document.getElementById('placeholderState');
  const errorState  = document.getElementById('errorState');
  const verdictCard = document.getElementById('verdictCard');
  const verdictEmoji= document.getElementById('verdictEmoji');
  const verdictName = document.getElementById('verdictName');
  const verdictConf = document.getElementById('verdictConf');
  const confBar     = document.getElementById('confBar');
  const probsSection= document.getElementById('probsSection');
  const probsList   = document.getElementById('probsList');
  const infoBlurb   = document.getElementById('infoBlurb');

  let selectedFile = null;

  // --- Upload interactions ---
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.onload = () => preview.classList.add('loaded');
      dropZone.classList.add('has-image');
      imageName.textContent = file.name;
      analyzeBtn.disabled = false;
      resetResults();
    };
    reader.readAsDataURL(file);
  }

  function resetResults() {
    placeholder.style.display = 'flex';
    errorState.style.display = 'none';
    verdictCard.style.display = 'none';
    probsSection.style.display = 'none';
    infoBlurb.style.display = 'none';
    verdictCard.className = 'verdict-card';
    confBar.style.width = '0';
  }

  // ── Config ──────────────────────────────────────────────────────────────────
  // Change this if your FastAPI server runs on a different host / port
  const API_URL = '/predict';  // relative — works when served by server.py

  // --- Analyse ---
  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    analyzeBtn.classList.add('loading');
    analyzeBtn.disabled = true;
    resetResults();
    placeholder.style.display = 'flex';

    try {
      // Send image as multipart/form-data — matches FastAPI UploadFile param
      const form = new FormData();
      form.append('file', selectedFile);

      const response = await fetch(API_URL, { method: 'POST', body: form });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.detail || `Server error ${response.status}`);
      }

      const result = await response.json();
      // API returns: { prediction, confidence, probabilities, unknown }
      showResults(result);

    } catch (err) {
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
        showError('Cannot reach the model server. Make sure server.py is running on localhost:8000.');
      } else {
        showError(`Analysis failed: ${err.message}`);
      }
      console.error(err);
    } finally {
      analyzeBtn.classList.remove('loading');
      analyzeBtn.disabled = false;
    }
  });

  function showResults(result) {
    placeholder.style.display = 'none';

    const pred = result.prediction;
    const conf = result.confidence;
    const probs = result.probabilities;
    const info = DESCRIPTIONS[pred];
    const isUnknown = result.unknown ?? (conf < 0.6);

    // Verdict card
    const fruitKey = getFruitKey(pred);
    verdictEmoji.textContent = FRUIT_EMOJIS[fruitKey];
    verdictCard.style.display = 'block';

    if (isUnknown) {
      verdictCard.classList.add('unknown');
      verdictName.textContent = 'Uncertain';
    } else {
      verdictCard.classList.add(info.status);
      verdictName.textContent = info.short;
    }

    verdictConf.textContent = `Confidence: ${(conf * 100).toFixed(1)}%`;
    setTimeout(() => { confBar.style.width = `${conf * 100}%`; }, 50);

    // Probabilities
    probsSection.style.display = 'block';
    probsList.innerHTML = CLASS_NAMES
      .sort((a, b) => probs[b] - probs[a])
      .map(cls => {
        const pct = ((probs[cls] || 0) * 100).toFixed(1);
        const isFresh = cls.startsWith('fresh');
        const label = cls.replace('fresh', 'Fresh ').replace('rotten', 'Rotten ');
        const capitalize = s => s.charAt(0).toUpperCase() + s.slice(1);
        return `
          <div class="prob-row">
            <div>
              <div class="prob-meta">
                <div class="prob-dot ${isFresh ? 'fresh' : 'rotten'}"></div>
                <div class="prob-name">${capitalize(label.trim())}</div>
              </div>
              <div class="prob-bar-wrap">
                <div class="prob-bar-fill ${isFresh ? 'fresh' : 'rotten'}" data-pct="${pct}" style="width:0"></div>
              </div>
            </div>
            <div class="prob-pct">${pct}%</div>
          </div>`;
      }).join('');

    setTimeout(() => {
      document.querySelectorAll('.prob-bar-fill').forEach(el => {
        el.style.width = `${el.dataset.pct}%`;
      });
    }, 100);

    // Info blurb
    if (info) {
      infoBlurb.innerHTML = isUnknown
        ? '<strong>Low confidence.</strong> The model is not certain about this fruit. Try a clearer, well-lit photo against a plain background.'
        : `<strong>${info.short}.</strong> ${info.tip}`;
      infoBlurb.style.display = 'block';
    }
  }

  function showError(msg) {
    placeholder.style.display = 'none';
    errorState.textContent = `⚠ ${msg}`;
    errorState.style.display = 'block';
  }

  // FileReader is still used for the image preview above (handleFile)
</script>
</body>
</html>
